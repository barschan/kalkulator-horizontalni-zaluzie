<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kalkulačka žaluzií</title>
<style>
  :root {
    --bg: #f5f4f0; --surface: #ffffff; --border: #e2e0d8; --border-mid: #c8c6bc;
    --text: #1a1917; --text-muted: #6b6960; --text-hint: #9e9b90;
    --accent: #2a5c3f; --accent-light: #e8f2ec; --accent-text: #1e4530;
    --warn-bg: #fef8ec; --warn-text: #8a6000; --danger: #c0392b;
    --radius: 10px; --radius-sm: 6px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Georgia', 'Times New Roman', serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 2rem 1rem; }
  h1 { font-size: 1.6rem; font-weight: normal; letter-spacing: -0.02em; margin-bottom: 0.25rem; }
  .container { max-width: 820px; margin: 0 auto; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.25rem 1.5rem; margin-bottom: 12px; }
  .sec-title { font-size: 10px; font-weight: bold; letter-spacing: .1em; text-transform: uppercase; color: var(--text-hint); font-family: 'Helvetica Neue', Arial, sans-serif; margin-bottom: 14px; }
  label { font-size: 12px; color: var(--text-muted); display: block; margin-bottom: 5px; font-family: 'Helvetica Neue', Arial, sans-serif; }
  input[type=number], input[type=text], select { width: 100%; height: 38px; padding: 0 12px; border: 1px solid var(--border-mid); border-radius: var(--radius-sm); font-size: 14px; background: var(--surface); color: var(--text); font-family: 'Helvetica Neue', Arial, sans-serif; outline: none; transition: border-color .15s; }
  input:focus, select:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(42,92,63,.1); }
  .g2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
  .g4 { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 10px; margin-bottom: 10px; }
  .pripl-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 7px; margin-bottom: 14px; }
  .pitem { display: flex; align-items: center; justify-content: space-between; padding: 8px 11px; border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: 12px; cursor: pointer; user-select: none; font-family: 'Helvetica Neue', Arial, sans-serif; transition: background .1s, border-color .1s; }
  .pitem:hover { background: var(--accent-light); }
  .pitem.on { border-color: var(--accent); background: var(--accent-light); }
  .pitem.on .pn { color: var(--accent-text); } .pitem.on .pp { color: var(--accent); }
  .pn { color: var(--text-muted); max-width: 74%; line-height: 1.3; }
  .pp { color: var(--text-hint); font-weight: bold; white-space: nowrap; font-size: 11px; }
  .add-btn { width: 100%; padding: 11px; border: 1.5px dashed var(--border-mid); border-radius: var(--radius-sm); background: transparent; color: var(--text-muted); font-size: 13px; cursor: pointer; font-family: 'Helvetica Neue', Arial, sans-serif; transition: all .15s; margin-top: 4px; }
  .add-btn:hover { background: var(--accent-light); border-color: var(--accent); color: var(--accent-text); }
  .save-btn { width: 100%; padding: 13px; border: none; border-radius: var(--radius-sm); background: var(--accent); color: #fff; font-size: 14px; font-weight: bold; cursor: pointer; font-family: 'Helvetica Neue', Arial, sans-serif; transition: background .15s; margin-top: 10px; }
  .save-btn:hover { background: var(--accent-text); }
  .save-btn:disabled { background: var(--text-hint); cursor: not-allowed; }
  .polozka { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); margin-bottom: 8px; overflow: hidden; }
  .pol-head { display: flex; align-items: center; justify-content: space-between; padding: 11px 14px; cursor: pointer; user-select: none; transition: background .1s; font-family: 'Helvetica Neue', Arial, sans-serif; }
  .pol-head:hover { background: var(--bg); }
  .pol-num { font-size: 11px; color: var(--text-hint); min-width: 22px; }
  .pol-title { font-size: 13px; font-weight: bold; color: var(--text); }
  .pol-meta { font-size: 11px; color: var(--text-hint); margin-top: 2px; }
  .pol-price { font-size: 13px; font-weight: bold; color: var(--accent); margin-right: 10px; }
  .pol-del { background: none; border: none; cursor: pointer; color: var(--text-hint); font-size: 18px; padding: 0 4px; line-height: 1; transition: color .1s; }
  .pol-del:hover { color: var(--danger); }
  .pol-body { padding: 12px 14px; border-top: 1px solid var(--border); background: var(--bg); display: none; font-family: 'Helvetica Neue', Arial, sans-serif; }
  .bd-row { display: flex; justify-content: space-between; padding: 4px 0; border-bottom: 1px solid var(--border); font-size: 12px; }
  .bd-row:last-child { border: none; font-weight: bold; font-size: 13px; padding-top: 8px; }
  .bd-l { color: var(--text-muted); } .bd-v { color: var(--text); font-weight: bold; }
  .note { font-size: 11px; color: var(--text-hint); margin-top: 6px; font-family: 'Helvetica Neue', Arial, sans-serif; }
  .warn { font-size: 12px; color: var(--warn-text); background: var(--warn-bg); border-radius: var(--radius-sm); padding: 7px 11px; margin-top: 8px; font-family: 'Helvetica Neue', Arial, sans-serif; border: 1px solid #f0d080; }
  .metric-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 14px; }
  .metric { background: var(--bg); border-radius: var(--radius-sm); padding: 12px 14px; font-family: 'Helvetica Neue', Arial, sans-serif; }
  .ml { font-size: 11px; color: var(--text-hint); margin-bottom: 4px; }
  .mv { font-size: 20px; font-weight: bold; color: var(--text); }
  .total-row { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px solid var(--border); font-size: 13px; font-family: 'Helvetica Neue', Arial, sans-serif; }
  .total-row:last-child { border: none; font-weight: bold; font-size: 16px; padding-top: 10px; color: var(--accent-text); }
  .tl { color: var(--text-muted); } .tv { color: var(--text); font-weight: bold; }
  .chevron { display: inline-block; font-size: 12px; color: var(--text-hint); transition: transform .2s; }
  .open .chevron { transform: rotate(180deg); }
  .empty { font-size: 13px; color: var(--text-hint); font-family: 'Helvetica Neue', Arial, sans-serif; }
  .header-bar { display: flex; align-items: baseline; gap: 1rem; margin-bottom: 2rem; }
  .status { font-size: 13px; font-family: 'Helvetica Neue', Arial, sans-serif; padding: 10px 14px; border-radius: var(--radius-sm); margin-top: 10px; display: none; }
  .status.ok { background: var(--accent-light); color: var(--accent-text); border: 1px solid rgba(42,92,63,.2); }
  .status.err { background: #fde8e8; color: var(--danger); border: 1px solid #f0b0b0; }
  @media (max-width: 600px) { .g4 { grid-template-columns: 1fr 1fr; } .metric-row { grid-template-columns: 1fr 1fr; } .pripl-grid { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<div class="container">
  <div class="header-bar">
    <h1>Kalkulačka žaluzií</h1>
  </div>

  <!-- Zákazník -->
  <div class="card">
    <div class="sec-title">Zákazník / zakázka</div>
    <div><label>Jméno zákazníka nebo název zakázky</label>
    <input type="text" id="f-zakaznik" placeholder="např. Jana Nováková – Hlavní 5, Praha"></div>
  </div>

  <!-- Formulář nové položky -->
  <div class="card" id="form-card">
    <div class="sec-title">Nová položka</div>
    <div class="g2">
      <div><label>Popis / umístění</label><input type="text" id="f-popis" placeholder="např. Ložnice – okno jižní"></div>
      <div><label>Typ žaluzie</label><select id="f-typ" onchange="renderPriplatky()"><option value="isoline">Isoline / Isoline Loco</option><option value="prim">Isoline Prim</option><option value="eco">Isoline ECO</option></select></div>
    </div>
    <div class="g4">
      <div><label>Šířka (mm)</label><input type="number" id="f-sirka" value="1000" min="1"></div>
      <div><label>Výška (mm)</label><input type="number" id="f-vyska" value="1200" min="1"></div>
      <div><label>Počet kusů</label><input type="number" id="f-kusy" value="1" min="1"></div>
      <div><label>Ovládání</label><select id="f-ovladani"><option value="pravé">Pravé</option><option value="levé">Levé</option></select></div>
    </div>
    <div class="g2"><div><label>Montáž (Kč/ks)</label><input type="number" id="f-montaz" value="250" min="0"></div></div>
    <div class="sec-title" style="margin-top:10px">Příplatky — klikněte pro aktivaci</div>
    <div class="pripl-grid" id="pripl-grid"></div>
    <div id="form-note" class="note"></div>
    <button class="add-btn" onclick="pridatPolozku()">＋ Přidat položku do objednávky</button>
  </div>

  <div id="polozky-wrap"></div>

  <!-- Souhrn + uložení -->
  <div class="card" id="total-card">
    <div class="sec-title">Souhrn objednávky</div>
    <div id="total-body"><span class="empty">Zatím žádné položky.</span></div>
    <button class="save-btn" id="save-btn" onclick="ulozitZakazku()" disabled>💾 Uložit zakázku do Google tabulky</button>
    <div class="status" id="status-msg"></div>
  </div>
</div>

,1006,1048,1173,1225,1281,1330,1387,1449,1553,1618,1754,1886,2019],[472,527,585,641,719,776,832,923,979,1031,1089,1210,1260,1317,1380,1427,1478,1600,1691,1819,1946,2072],[483,539,603,650,734,794,852,960,1007,1058,1128,1243,1294,1353,1431,1468,1505,1642,1761,1884,2005,2126],[497,547,622,670,751,815,874,993,1031,1088,1166,1279,1328,1388,1484,1509,1535,1690,1832,1949,2066,2183],[506,562,643,683,766,832,893,1029,1056,1115,1210,1316,1362,1423,1535,1551,1560,1733,1903,2014,2125,2237]],priplatky:[{id:'barva',name:'Barva lamel (780,783,1940,8005,8101,8300,8204,8107)',sazba:105,j:'m2'},{id:'perf',name:'Perforované lamely (PR1,PR58,PR61,PR103,PR285)',sazba:92,j:'m2'},{id:'l16',name:'Lamela 16 mm',sazba:90,j:'m2'},{id:'l25std',name:'Lamela 25×0,21 (č. 101–155, 211–265, 311–371, 700, 714)',sazba:90,j:'m2'},{id:'l25sr',name:'Lamela 25×0,21 SR/SM (SR 621–630, SM 801–869)',sazba:251,j:'m2'},{id:'drevo',name:'Imitace dřeva',sazba:205,j:'m2'},{id:'domyk',name:'Domykatelné provedení',sazba:40,j:'m2'},{id:'drevodomyk',name:'Imitace dřeva + domykatelné',sazba:323,j:'m2'},{id:'distpodl',name:'Distanční podložka',sazba:8,j:'ks'},{id:'bezprvek',name:'Bezpečnostní prvek',sazba:15,j:'ks'},{id:'alral',name:'Profily Al v RAL',sazba:178,j:'bm'},{id:'aldrev',name:'Profily Al v imitaci dřeva',sazba:159,j:'bm'},{id:'fedrev',name:'Profily Fe v imitaci dřeva',sazba:159,j:'bm'}]};

const CENIKI={isoline:ISOLINE,prim:PRIM,eco:ECO};
const TYPY={isoline:'Isoline / Loco',prim:'Isoline Prim',eco:'Isoline ECO'};
let aktivni={},polozky=[],nextId=1;

function nb(arr,val){for(let i=0;i<arr.length;i++)if(arr[i]>=val)return{idx:i,v:arr[i]};return{idx:arr.length-1,v:arr[arr.length-1]};}
function ceil(v){return Math.ceil(v);}
function kc(v){return v.toLocaleString('cs-CZ')+'\u00a0K\u010d';}

function renderPriplatky(){
  const typ=document.getElementById('f-typ').value,c=CENIKI[typ];
  aktivni={};
  const g=document.getElementById('pripl-grid');g.innerHTML='';
  c.priplatky.forEach(p=>{
    const d=document.createElement('div');d.className='pitem';d.dataset.id=p.id;
    const jl=p.j==='m2'?'K\u010d/m\u00b2':p.j==='bm'?'K\u010d/bm':'K\u010d/ks';
    d.innerHTML='<span class="pn">'+p.name+'</span><span class="pp">'+p.sazba+' '+jl+'</span>';
    d.onclick=function(){if(aktivni[p.id]){delete aktivni[p.id];d.classList.remove('on');}else{aktivni[p.id]=true;d.classList.add('on');}};
    g.appendChild(d);
  });
}

function kalkuluj(typ,sirkaIn,vyskaIn,kusy,montazKs,priplIds){
  const c=CENIKI[typ],s=nb(c.sirky,sirkaIn),v=nb(c.vysky,vyskaIn);
  const zaklCena=c.ceny[v.idx][s.idx],plocha=(s.v/1000)*(v.v/1000);
  let pripl=0;const priplRozpis=[];const priplNazvy=[];
  c.priplatky.forEach(p=>{
    if(!priplIds[p.id])return;
    let castka;
    if(p.j==='m2'){castka=ceil(p.sazba*plocha);priplRozpis.push({name:p.name,castka,info:p.sazba+' K\u010d/m\u00b2 \u00d7 '+plocha.toFixed(3).replace('.',',')+' m\u00b2'});}
    else if(p.j==='bm'){const bm=s.v/1000;castka=ceil(p.sazba*bm);priplRozpis.push({name:p.name,castka,info:p.sazba+' K\u010d/bm \u00d7 '+bm.toFixed(3).replace('.',',')+' bm'});}
    else{castka=p.sazba;priplRozpis.push({name:p.name,castka,info:p.sazba+' K\u010d/ks'});}
    priplNazvy.push(p.name);
    pripl+=castka;
  });
  const cena1ks=zaklCena+pripl,bezM=cena1ks*kusy,sM=bezM+montazKs*kusy;
  const warn=(sirkaIn>c.sirky[c.sirky.length-1]||vyskaIn>c.vysky[c.vysky.length-1]);
  return{s,v,plocha,zaklCena,pripl,priplRozpis,priplNazvy,cena1ks,bezM,sM,warn};
}

function pridatPolozku(){
  const typ=document.getElementById('f-typ').value;
  const sirkaIn=parseInt(document.getElementById('f-sirka').value)||0;
  const vyskaIn=parseInt(document.getElementById('f-vyska').value)||0;
  const kusy=parseInt(document.getElementById('f-kusy').value)||1;
  const montazKs=parseInt(document.getElementById('f-montaz').value)||0;
  const popis=document.getElementById('f-popis').value.trim()||'Bez popisu';
  const ovladani=document.getElementById('f-ovladani').value;
  const priplIds=Object.assign({},aktivni);
  if(!sirkaIn||!vyskaIn){document.getElementById('form-note').textContent='Zadejte \u0161\u00ed\u0159ku a v\u00fd\u0161ku.';return;}
  const r=kalkuluj(typ,sirkaIn,vyskaIn,kusy,montazKs,priplIds);
  polozky.push({id:nextId++,typ,sirkaIn,vyskaIn,kusy,montazKs,popis,ovladani,priplIds,r});
  document.getElementById('f-popis').value='';
  document.getElementById('form-note').textContent='';
  renderPriplatky();renderPolozky();renderTotal();
}

function smazat(id){polozky=polozky.filter(function(p){return p.id!==id;});renderPolozky();renderTotal();}

function toggle(id){
  const body=document.getElementById('pb-'+id),head=document.getElementById('ph-'+id);
  const open=body.style.display==='block';
  body.style.display=open?'none':'block';
  if(open)head.classList.remove('open');else head.classList.add('open');
}

function renderPolozky(){
  const wrap=document.getElementById('polozky-wrap');
  if(!polozky.length){wrap.innerHTML='';return;}
  let html='<div class="card"><div class="sec-title">Polo\u017eky objedn\u00e1vky ('+polozky.length+')</div>';
  polozky.forEach(function(p,i){
    const r=p.r;
    let bd='<div class="bd-row"><span class="bd-l">Typ</span><span class="bd-v">'+TYPY[p.typ]+'</span></div>';
    bd+='<div class="bd-row"><span class="bd-l">Zadan\u00e9 rozm\u011bry</span><span class="bd-v">'+p.sirkaIn+' \u00d7 '+p.vyskaIn+' mm</span></div>';
    bd+='<div class="bd-row"><span class="bd-l">Rozm\u011br z cen\u00edku</span><span class="bd-v">'+r.s.v+' \u00d7 '+r.v.v+' mm</span></div>';
    bd+='<div class="bd-row"><span class="bd-l">Plocha</span><span class="bd-v">'+r.plocha.toFixed(4).replace('.',',')+' m\u00b2</span></div>';
    bd+='<div class="bd-row"><span class="bd-l">Ovl\u00e1d\u00e1n\u00ed</span><span class="bd-v">'+p.ovladani+'</span></div>';
    bd+='<div class="bd-row"><span class="bd-l">Z\u00e1kladn\u00ed cena</span><span class="bd-v">'+kc(r.zaklCena)+'</span></div>';
    r.priplRozpis.forEach(function(pr){bd+='<div class="bd-row"><span class="bd-l">'+pr.name+' <small style="color:#9e9b90">('+pr.info+')</small></span><span class="bd-v">+ '+kc(pr.castka)+'</span></div>';});
    if(p.kusy>1)bd+='<div class="bd-row"><span class="bd-l">Cena 1 ks</span><span class="bd-v">'+kc(r.cena1ks)+'</span></div>';
    if(p.montazKs>0)bd+='<div class="bd-row"><span class="bd-l">Mont\u00e1\u017e '+p.kusy+' ks \u00d7 '+kc(p.montazKs)+'</span><span class="bd-v">+ '+kc(p.montazKs*p.kusy)+'</span></div>';
    bd+='<div class="bd-row"><span class="bd-l">Celkem s mont\u00e1\u017e\u00ed</span><span class="bd-v">'+kc(r.sM)+'</span></div>';
    const warnHtml=r.warn?'<div class="warn">\u26a0 Rozm\u011br p\u0159esahuje rozsah cen\u00edku \u2014 pou\u017eit nejv\u011bt\u0161\u00ed dostupn\u00fd.</div>':'';
    html+='<div class="polozka"><div class="pol-head" id="ph-'+p.id+'" onclick="toggle('+p.id+')"><div style="display:flex;align-items:center;gap:10px"><span class="pol-num">'+(i+1)+'.</span><div><div class="pol-title">'+p.popis+'</div><div class="pol-meta">'+TYPY[p.typ]+' \u00b7 '+p.sirkaIn+'\u00d7'+p.vyskaIn+' mm \u00b7 '+p.kusy+' ks \u00b7 ovl. '+p.ovladani+'</div></div></div><div style="display:flex;align-items:center"><span class="pol-price">'+kc(r.sM)+'</span><button class="pol-del" onclick="event.stopPropagation();smazat('+p.id+')" title="Smazat">\u00d7</button><span class="chevron">\u25be</span></div></div><div class="pol-body" id="pb-'+p.id+'">'+bd+warnHtml+'</div></div>';
  });
  html+='</div>';wrap.innerHTML=html;
}

function renderTotal(){
  const body=document.getElementById('total-body');
  const btn=document.getElementById('save-btn');
  if(!polozky.length){body.innerHTML='<span class="empty">Zat\u00edm \u017e\u00e1dn\u00e9 polo\u017eky.</span>';btn.disabled=true;return;}
  const sumBez=polozky.reduce(function(a,p){return a+p.r.bezM;},0);
  const sumS=polozky.reduce(function(a,p){return a+p.r.sM;},0);
  const sumKs=polozky.reduce(function(a,p){return a+p.kusy;},0);
  let html='<div class="metric-row"><div class="metric"><div class="ml">Po\u010det polo\u017eek</div><div class="mv">'+polozky.length+'</div></div><div class="metric"><div class="ml">Celkem kus\u016f</div><div class="mv">'+sumKs+'</div></div><div class="metric"><div class="ml">Bez mont\u00e1\u017ee celkem</div><div class="mv">'+kc(sumBez)+'</div></div></div>';
  polozky.forEach(function(p,i){html+='<div class="total-row"><span class="tl">'+(i+1)+'. '+p.popis+' <small style="color:#9e9b90">('+p.kusy+' ks \u00b7 ovl. '+p.ovladani+')</small></span><span class="tv">'+kc(p.r.sM)+'</span></div>';});
  html+='<div class="total-row"><span>Celkem v\u010d. mont\u00e1\u017ee</span><span>'+kc(sumS)+'</span></div>';
  body.innerHTML=html;
  btn.disabled=false;
}

function ulozitZakazku(){
  const zakaznik=document.getElementById('f-zakaznik').value.trim()||'Neuvedeno';
  const btn=document.getElementById('save-btn');
  const status=document.getElementById('status-msg');
  btn.disabled=true;
  btn.textContent='Ukládám...';
  status.style.display='none';

  const data={
    zakaznik:zakaznik,
    polozky:polozky.map(function(p){
      return {
        popis:p.popis,
        typ:TYPY[p.typ],
        sirkaIn:p.sirkaIn,
        vyskaIn:p.vyskaIn,
        kusy:p.kusy,
        ovladani:p.ovladani,
        priplatkyText:p.r.priplNazvy.join(', ')||'žádné',
        bezMontaze:p.r.bezM,
        montaz:p.montazKs*p.kusy,
        celkem:p.r.sM
      };
    })
  };

  fetch(SCRIPT_URL,{method:'POST',body:JSON.stringify(data)})
    .then(function(r){return r.text();})
    .then(function(){
      status.className='status ok';
      status.textContent='✓ Zakázka pro „'+zakaznik+'" byla uložena do Google tabulky.';
      status.style.display='block';
      btn.textContent='Uložit zakázku do Google tabulky';
      btn.disabled=false;
    })
    .catch(function(){
      status.className='status err';
      status.textContent='✗ Nepodařilo se uložit. Zkontrolujte připojení k internetu.';
      status.style.display='block';
      btn.textContent='💾 Uložit zakázku do Google tabulky';
      btn.disabled=false;
    });
}
